<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Enter your Artisan password reset verification code." />
    <title>Verification code | Artisan</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="index.html" class="logo" aria-label="Artisan home">
          <span class="logo__mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          Artisan
        </a>
        <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <nav class="nav" data-nav-panel aria-label="Main">
          <a href="index.html" class="nav__link" data-nav>Home</a>
          <a href="login.html" class="nav__link">Log in</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="auth-layout">
        <div class="container">
          <div class="auth-card">
            <h1>Enter verification code</h1>
            <p class="auth-card__sub" id="otp-email-line">We sent a 6-digit code to your email.</p>
            <p id="otp-dev-banner" class="auth-card__sub" style="display: none; color: var(--color-accent, #0d6efd)" aria-live="polite"></p>

            <form id="forgot-otp-form" novalidate>
              <div class="form-group">
                <label for="forgot-otp">6-digit code</label>
                <input
                  id="forgot-otp"
                  name="otp"
                  type="text"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                  maxlength="8"
                  required
                  placeholder="000000"
                />
                <p class="form-error" role="alert"></p>
              </div>
              <button type="submit" class="btn btn--primary btn--block btn--cta">Verify</button>
              <p class="text-center mt-2" style="color: var(--color-text-muted); font-size: 0.9375rem">
                <a href="forgot-password.html">Use a different email</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__bottom">© <span id="year"></span> Artisan. Academic project — J.U.S.T. Computer Science.</div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/api-config.js"></script>
    <script src="js/artisan-api.js"></script>
    <script src="js/app.js" defer></script>
    <script>
      (function () {
        var KEY_EMAIL = "artisan_pw_reset_email";
        var KEY_TOKEN = "artisan_pw_reset_token";
        var KEY_DEV_OTP = "artisan_pw_reset_dev_otp";
        document.addEventListener("DOMContentLoaded", function () {
          var email = "";
          try {
            email = sessionStorage.getItem(KEY_EMAIL) || "";
          } catch (e) {}
          if (!email) {
            window.location.href = "forgot-password.html";
            return;
          }
          var line = document.getElementById("otp-email-line");
          line.textContent = "Enter the code sent to " + email + ".";
          try {
            var dev = sessionStorage.getItem(KEY_DEV_OTP);
            if (dev) {
              var b = document.getElementById("otp-dev-banner");
              b.style.display = "block";
              b.textContent = "Development: your code is " + dev + ".";
              sessionStorage.removeItem(KEY_DEV_OTP);
            }
          } catch (x) {}

          var form = document.getElementById("forgot-otp-form");
          var input = document.getElementById("forgot-otp");
          var err = form.querySelector(".form-error");
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            err.textContent = "";
            var otp = (input.value || "").trim();
            if (!otp) {
              err.textContent = "Enter the code from your email.";
              return;
            }
            var btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            window.ArtisanAuth.forgotPasswordVerifyOtp({ email: email, otp: otp }).then(function (res) {
              btn.disabled = false;
              if (!res.ok || !res.data || !res.data.resetToken) {
                var d = res.data || {};
                err.textContent =
                  d.error ||
                  d.title ||
                  (d.errors && d.errors.join && d.errors.join(" ")) ||
                  (res.status >= 500 ? "Server error. Try again or restart the API." : "Invalid or expired code.");
                return;
              }
              try {
                sessionStorage.setItem(KEY_TOKEN, res.data.resetToken);
              } catch (x) {}
              window.location.href = "reset-password.html";
            }).catch(function () {
              btn.disabled = false;
              err.textContent = "Network error. Check that the API is running.";
            });
          });
        });
      })();
    </script>
  </body>
</html>
