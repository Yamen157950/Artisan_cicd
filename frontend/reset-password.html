<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Choose a new Artisan password." />
    <title>Reset password | Artisan</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="index.html" class="logo" aria-label="Artisan home">
          <span class="logo__mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          Artisan
        </a>
        <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <nav class="nav" data-nav-panel aria-label="Main">
          <a href="index.html" class="nav__link" data-nav>Home</a>
          <a href="login.html" class="nav__link">Log in</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="auth-layout">
        <div class="container">
          <div class="auth-card">
            <h1>Set a new password</h1>
            <p class="auth-card__sub" id="reset-email-line">Choose a new password for your account.</p>

            <form id="reset-password-form" novalidate>
              <div class="form-group">
                <label for="reset-password">New password</label>
                <input id="reset-password" name="password" type="password" autocomplete="new-password" required minlength="8" />
                <p class="form-error" role="alert"></p>
              </div>
              <div class="form-group">
                <label for="reset-confirm">Confirm password</label>
                <input id="reset-confirm" name="confirm" type="password" autocomplete="new-password" required />
                <p class="form-error" role="alert"></p>
              </div>
              <button type="submit" class="btn btn--primary btn--block btn--cta">Update password</button>
              <p class="text-center mt-2" style="color: var(--color-text-muted); font-size: 0.9375rem">
                <a href="login.html">Back to log in</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__bottom">© <span id="year"></span> Artisan. Academic project — J.U.S.T. Computer Science.</div>
      </div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="js/api-config.js"></script>
    <script src="js/artisan-api.js"></script>
    <script src="js/app.js" defer></script>
    <script>
      (function () {
        var KEY_EMAIL = "artisan_pw_reset_email";
        var KEY_TOKEN = "artisan_pw_reset_token";
        document.addEventListener("DOMContentLoaded", function () {
          var email = "";
          var token = "";
          try {
            email = sessionStorage.getItem(KEY_EMAIL) || "";
            token = sessionStorage.getItem(KEY_TOKEN) || "";
          } catch (e) {}
          if (!email || !token) {
            window.location.href = "forgot-password.html";
            return;
          }
          var line = document.getElementById("reset-email-line");
          line.textContent = "For " + email + " — at least 8 characters.";

          var form = document.getElementById("reset-password-form");
          var pw = document.getElementById("reset-password");
          var cf = document.getElementById("reset-confirm");
          if (window.ArtisanUI && typeof ArtisanUI.attachLatinPasswordInput === "function") {
            ArtisanUI.attachLatinPasswordInput(pw);
            ArtisanUI.attachLatinPasswordInput(cf);
          }
          var err = form.querySelectorAll(".form-error");
          var noArabicMsg =
            (window.ArtisanUI && ArtisanUI.PASSWORD_NO_ARABIC_MSG) ||
            "Password cannot contain Arabic characters. Use Latin letters, numbers, and symbols only.";
          function setErr(i, msg) {
            err[i].textContent = msg || "";
          }
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            setErr(0, "");
            setErr(1, "");
            var p = (pw.value || "").trim();
            var c = (cf.value || "").trim();
            if (
              (window.ArtisanUI && ArtisanUI.passwordContainsArabic(p)) ||
              (window.ArtisanUI && ArtisanUI.passwordContainsArabic(c))
            ) {
              setErr(0, noArabicMsg);
              return;
            }
            if (p.length < 8) {
              setErr(0, "Password must be at least 8 characters.");
              return;
            }
            if (p !== c) {
              setErr(1, "Passwords do not match.");
              return;
            }
            var btn = form.querySelector('button[type="submit"]');
            btn.disabled = true;
            window.ArtisanAuth.forgotPasswordReset({ email: email, token: token, newPassword: p }).then(function (res) {
              btn.disabled = false;
              if (!res.ok || !res.data) {
                var msg =
                  (res.data && res.data.error) ||
                  (res.data && res.data.errors && res.data.errors.join(" ")) ||
                  "Could not reset password. Start again from email.";
                setErr(0, msg);
                return;
              }
              try {
                sessionStorage.removeItem(KEY_EMAIL);
                sessionStorage.removeItem(KEY_TOKEN);
              } catch (x) {}
              if (window.ArtisanUI && window.ArtisanUI.showToast) {
                window.ArtisanUI.showToast("Password updated. You can log in.", "success");
              }
              window.location.href = "login.html";
            });
          });
        });
      })();
    </script>
  </body>
</html>
