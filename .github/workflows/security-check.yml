name: Security and Performance Checks

on:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Dependencies
        run: dotnet restore ./Backend/ArtisanApi/ArtisanApi.csproj

      - name: Build Project
        run: dotnet build ./Backend/ArtisanApi/ArtisanApi.csproj --no-restore

      - name: Security Audit
        run: dotnet list ./Backend/ArtisanApi/ArtisanApi.csproj package --vulnerable

      - name: Check Deprecated Packages
        run: dotnet list ./Backend/ArtisanApi/ArtisanApi.csproj package --outdated
